const blockCounts = { A: DATA.filter(d => d.b === 'A').length, B: DATA.filter(d => d.b === 'B').length };
document.querySelectorAll('.filter-btn').forEach(btn => {
  const b = btn.dataset.block;
  if (b === 'A') btn.textContent = `Block A (${blockCounts.A})`;
  if (b === 'B') btn.textContent = `Block B (${blockCounts.B})`;
});

let activeBlock = 'all';

function render() {
  const q = document.getElementById('search').value.trim().toUpperCase();
  let filtered = DATA;

  if (activeBlock !== 'all') filtered = filtered.filter(d => d.b === activeBlock);
  if (q) filtered = filtered.filter(d => d.f.includes(q) || d.e.includes(q));

  const stats = document.getElementById('stats');
  stats.textContent = `Showing ${filtered.length} of ${DATA.length} properties`;

  const results = document.getElementById('results');
  if (!filtered.length) {
    results.innerHTML = '<div class="empty"><div class="empty-icon">&#128269;</div>No properties found. Try a different search.</div>';
    return;
  }

  results.innerHTML = filtered.map(d => `
    <div class="card">
      <div class="card-info">
        <div><span class="card-flat">${d.f}</span><span class="card-block">Block ${d.b}</span></div>
      </div>
      <a class="dl-btn" href="pdfs/${d.f}.pdf" download="${d.f}.pdf">Download</a>
    </div>
  `).join('');
}

document.getElementById('search').addEventListener('input', render);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeBlock = btn.dataset.block;
    render();
  });
});

render();
</script>
